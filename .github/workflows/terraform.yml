name: Terraform

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'デプロイ環境'
        required: true
        type: choice
        options:
          - staging
          - production
      action:
        description: '実行アクション'
        required: true
        type: choice
        options:
          - plan
          - apply

env:
  AWS_REGION: ap-northeast-1

jobs:
  terraform:
    name: Terraform ${{ inputs.action }} (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Write tfvars
        working-directory: infrastructure
        env:
          TF_VARS_CONTENT: ${{ secrets.TF_VARS }}
        run: echo "$TF_VARS_CONTENT" > terraform.auto.tfvars

      - name: Terraform Init
        working-directory: infrastructure
        run: terraform init -reconfigure -backend-config="key=aimorpho/${{ inputs.environment }}.tfstate"

      - name: Terraform Plan
        working-directory: infrastructure
        run: |
          terraform plan \
            -var="environment=${{ inputs.environment }}" \
            -out=tfplan

      - name: Terraform Apply
        if: inputs.action == 'apply'
        working-directory: infrastructure
        run: terraform apply -auto-approve tfplan
