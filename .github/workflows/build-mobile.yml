name: Build Mobile

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'ビルドトラック'
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  ios:
    name: iOS Build (${{ inputs.track }})
    runs-on: macos-latest
    environment: ${{ inputs.track }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        working-directory: mobile
        run: npm ci

      - name: Install Pods
        working-directory: mobile/ios
        run: pod install

      - name: Build & Archive
        working-directory: mobile
        env:
          IOS_CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          BUILD_TRACK: ${{ inputs.track }}
        run: npm run build:ios

      - name: Upload to TestFlight
        working-directory: mobile
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_P8: ${{ secrets.APP_STORE_CONNECT_KEY_P8 }}
          # staging=internal track, production=external track
          TESTFLIGHT_TRACK: ${{ inputs.track == 'staging' && 'internal' || 'external' }}
        run: npm run submit:ios

  android:
    name: Android Build (${{ inputs.track }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.track }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Install deps
        working-directory: mobile
        run: npm ci

      - name: Build AAB
        working-directory: mobile/android
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Upload to Play Console
        working-directory: mobile
        env:
          GOOGLE_PLAY_JSON: ${{ secrets.GOOGLE_PLAY_JSON }}
          # staging=internal track, production=production track
          PLAY_TRACK: ${{ inputs.track == 'staging' && 'internal' || 'production' }}
        run: npm run submit:android

  notify:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: [ios, android]
    if: always()
    steps:
      - name: Notify
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ needs.ios.result == 'success' && needs.android.result == 'success' && ':white_check_mark:' || ':x:' }} Mobile Build (${{ inputs.track }}) | ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
